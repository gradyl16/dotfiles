# See https://wiki.hypr.land/Configuring/Variables/#group
group {
    # auto_group = true
    # insert_after_current = true
    # focus_removed_window = true
    drag_into_group = 1
    merge_groups_on_drag = false       # Only allow merging when into groupbar
    # merge_groups_on_groupbar = true  # Only allow merging when into groupbar
    # merge_floated_into_tiled_on_groupbar = false
    # group_on_movetoworkspace = false

    col.border_active = rgb(44475a) rgb(bd93f9) 90deg
    col.border_inactive = rgba(44475aaa)

    groupbar {
        # enabled = true
        # gradients = false
        # height = 14
        # indicator_gap = 0
        indicator_height = 5
        # stacked = true
        render_titles = false
        # scrolling = true
        rounding = 2
        rounding_power = 4
        round_only_edges = false
        keep_upper_gap = false
        # blur = true

        col.active = rgb(bd93f9)
        col.inactive = rgb(282a36)
    }
}


# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
# master {
#     new_status = master
# }

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    disable_hyprland_logo = true
    font_family = FiraCode Nerd Font
    splash_font_family = FiraCode Nerd Font
    force_default_wallpaper = 2
    # vfr = true
    # vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    # layers_hog_keyboard_focus = true
    # animate_manual_resizes = false
    # animate_mouse_windowdragging = false
    enable_swallow = true
    swallow_regex = ^(kitty)$
}

